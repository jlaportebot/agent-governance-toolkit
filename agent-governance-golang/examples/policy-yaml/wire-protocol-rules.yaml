# Wire-protocol-aware policy rules (Go SDK)
#
# Mirrors examples/policy-templates/wire-protocol-rules.yaml from the Python
# SDK. Load by parsing into []agentmesh.PolicyRule.
- action: db.exec
  effect: deny
  conditions:
    sql.verb:
      $in: [DROP, TRUNCATE, DELETE]

- action: db.exec
  effect: deny
  conditions:
    sql.verb:
      $in: [ALTER, GRANT, REVOKE]

- action: db.exec
  effect: deny
  conditions:
    sql.target: protected

- action: k8s.request
  effect: deny
  conditions:
    k8s.namespace: production

- action: k8s.request
  effect: deny
  conditions:
    k8s.subresource: exec

- action: k8s.request
  effect: deny
  conditions:
    k8s.verb: deletecollection
